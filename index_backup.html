                    </div>
                    <div class="absolute -top-3 -left-3 w-6 h-6 border-r border-b border-black bg-white"></div>
                    <div class="absolute -top-3 -right-3 w-6 h-6 border-l border-b border-black bg-white"></div>
                    <div class="absolute -bottom-3 -left-3 w-6 h-6 border-r border-t border-black bg-white"></div>
                    <div class="absolute -bottom-3 -right-3 w-6 h-6 border-l border-t border-black bg-white"></div>
                </div>
                <div class="flex justify-center mb-12">
                    <button onclick="resetTest()" class="px-12 py-4 bg-white border-2 border-black font-extrabold text-lg uppercase tracking-widest hover:bg-black hover:text-white transition-colors">
                        Restart
                    </button>
                </div>
            </div>
            <div class="marquee-container mt-auto">
                <div class="marquee-content">
                    <span class="marquee-text">ROOT AROUND, LOOK AROUND</span>
                    <span class="marquee-text">ROOT AROUND, LOOK AROUND</span>
                    <span class="marquee-text">ROOT AROUND, LOOK AROUND</span>
                    <span class="marquee-text">ROOT AROUND, LOOK AROUND</span>
                    <span class="marquee-text">ROOT AROUND, LOOK AROUND</span>
                    <span class="marquee-text">ROOT AROUND, LOOK AROUND</span>
                </div>
            </div>
        `;
        if(!aiResult && !isLoadingAi && !aiError) fetchAiResult();
        return;
    }

    const q = testData.questions[currentStep];
    const qAnswers = answers[q.id] || {};
    const isNextDisabled = Object.keys(qAnswers).length !== 4;
    const progressText = String(currentStep + 1).padStart(2, '0');

    let choicesHtml = '';
    let choiceIndex = 1;
    for (const [choiceKey, choiceText] of Object.entries(q.choices)) {
        let buttonsHtml = '';
        for (let score of [1, 2, 3, 4]) {
            const isSelected = qAnswers[choiceKey] === score;
            
            let btnClass = isSelected 
                ? "bg-black text-white border-black" 
                : "bg-white text-black border-black hover:bg-black hover:text-white";
            
            buttonsHtml += `
                <button 
                    onclick="setScore('${choiceKey}', ${score})"
                    class="w-10 h-10 border transition-all font-bold text-sm ${btnClass}"
                >
                    ${score}
                </button>
            `;
        }
        
        choicesHtml += `
            <div class="bg-white p-6 flex flex-col justify-between">
                <div class="font-medium text-lg mb-8">${choiceIndex}. ${choiceText}</div>
                <div class="flex justify-between border-t border-black pt-4">
                    ${buttonsHtml}
                </div>
            </div>
        `;
        choiceIndex++;
    }

    app.innerHTML = `
        <header class="border-b border-black py-4 px-6 flex justify-between items-center">
            <div class="font-extrabold text-xl tracking-tighter uppercase">ROOT4 TEMPER TEST</div>
            <div class="text-sm font-bold uppercase tracking-widest">[ ${progressText} / ${testData.questions.length} ]</div>
        </header>
        <div class="flex-1 max-w-4xl w-full mx-auto p-6 md:p-12 flex flex-col">
            <div class="flex justify-end gap-2 mb-4">
                <button onclick="resetTest()" class="px-4 py-2 border border-black font-bold uppercase text-xs hover:bg-black hover:text-white transition-colors">처음으로</button>
                <button onclick="skipStep()" class="px-4 py-2 border border-black font-bold uppercase text-xs hover:bg-black hover:text-white transition-colors">건너뛰기</button>
                <button onclick="finishTest()" class="px-4 py-2 border border-black font-bold uppercase text-xs hover:bg-black hover:text-white transition-colors">끝으로</button>
            </div>
            <div class="border border-black p-8 relative mb-12">
                <h2 class="text-2xl font-bold leading-snug tracking-tight">${currentStep + 1}. ${q.text}</h2>
                <div class="absolute -top-3 -left-3 w-6 h-6 border-r border-b border-black bg-white"></div>
                <div class="absolute -top-3 -right-3 w-6 h-6 border-l border-b border-black bg-white"></div>
                <div class="absolute -bottom-3 -left-3 w-6 h-6 border-r border-t border-black bg-white"></div>
                <div class="absolute -bottom-3 -right-3 w-6 h-6 border-l border-t border-black bg-white"></div>
            </div>
            ${q.imageUrl ? `<div class="mb-12 flex justify-center border border-black p-4"><img src="${q.imageUrl}" alt="보기 이미지" class="max-w-full h-auto grayscale contrast-125" /></div>` : ''}
            <div class="grid grid-cols-1 md:grid-cols-2 gap-px bg-black border border-black flex-1 content-start">
                ${choicesHtml}
            </div>
            <div class="mt-12 flex justify-between border-t border-black pt-6">
                <button onclick="prevStep()" ${currentStep === 0 ? 'disabled' : ''} class="px-8 py-3 font-bold uppercase tracking-widest text-sm border transition-colors ${currentStep === 0 ? 'text-gray-300 border-gray-200 cursor-not-allowed' : 'border-black text-black hover:bg-black hover:text-white'}">Prev</button>
                <button onclick="nextStep()" ${isNextDisabled ? 'disabled' : ''} class="px-12 py-3 font-bold uppercase tracking-widest text-sm border transition-all ${isNextDisabled ? 'bg-gray-100 text-gray-400 border-gray-200 cursor-not-allowed' : 'bg-black text-white border-black hover:bg-white hover:text-black'}">Next</button>
            </div>
        </div>
    `;
}

function startTest() { currentStep = 0; render(); }
function nextStep() { currentStep++; render(); }
function prevStep() { currentStep--; render(); }
function skipStep() { currentStep++; render(); }
function finishTest() { currentStep = testData.questions.length; render(); }
function resetTest() { currentStep = -1; answers = {}; calculatedResult = null; aiResult = null; render(); }

function setScore(choiceKey, score) {
    const qId = testData.questions[currentStep].id;
    if (!answers[qId]) answers[qId] = {};
    for (const [k, v] of Object.entries(answers[qId])) {
        if (v === score) delete answers[qId][k];
    }
    answers[qId][choiceKey] = score;
    render();
}

function calculateResult() {
    const scores = {"♥": 0, "☆": 0, "▲": 0, "♬": 0};
    testData.questions.forEach(q => {
        const qAnswers = answers[q.id];
        const scoringMap = testData.scoring[q.id];
        if (qAnswers && scoringMap) {
            for (const [choiceKey, score] of Object.entries(qAnswers)) {
                const symbol = scoringMap[choiceKey];
                if (symbol && scores[symbol] !== undefined) scores[symbol] += score;
            }
        }
    });

    let maxSymbol = "♥";
    let maxVal = -1;
    for (const [sym, val] of Object.entries(scores)) {
        if (val > maxVal) { maxVal = val; maxSymbol = sym; }
    }

    calculatedResult = { scores, maxSymbol, typeName: testData.types[maxSymbol] };
}

async function fetchAiResult() {
    isLoadingAi = true;
    aiError = null;
    render();

    const prompt = `
당신은 창의력 및 잠재력 개발 전문 분석가입니다.
사용자가 방금 진단 테스트를 마쳤습니다. 다음은 사용자의 최종 결과입니다:
- 우세 유형: ${calculatedResult.typeName} (${calculatedResult.maxSymbol})
- 점수 분포: ☆ (주도형M): ${calculatedResult.scores["☆"]}점, ♥ (S섬세형): ${calculatedResult.scores["♥"]}점, ▲ (비범형N): ${calculatedResult.scores["▲"]}점, ♬ (C은둔형): ${calculatedResult.scores["♬"]}점

이 점수 분포와 우세 유형을 바탕으로 사용자의 **창의력(Creativity)** 관점에 초점을 맞춘 심층 진단 리포트를 작성해주세요. 
아래 세 가지 섹션으로 나누어 작성해주되, 창의적 잠재력을 일깨워주는 통찰력 있고 영감을 주는 어조로 작성하세요. (각 섹션은 1~2단락 내외)
1. 창의력 관점에서의 성격 분석 (현재의 창의적 강점과 고유의 아이디어 발상 스타일)
2. 창의력 발현을 방해할 수 있는 요소 및 주의할 점
3. 창의력을 비약적으로 향상시키기 위한 구체적인 실천 조언
반드시 마크다운 형식(Markdown)으로 응답을 작성해 주세요.`;

    const apiKey = getApiKey();
    if (!apiKey) {
        isLoadingAi = false;
        aiError = "API 키가 필요합니다. 분석을 위해 Gemini API 키를 입력해주세요.";
        render();
        return;
    }

    try {
        const response = await fetch("https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=" + apiKey, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                contents: [{ parts: [{ text: prompt }] }]
            })
        });
        
        const data = await response.json();
        if (data.candidates && data.candidates.length > 0) {
            aiResult = data.candidates[0].content.parts[0].text;
        } else {
            const errorMsg = data.error ? data.error.message : "Unknown error";
            throw new Error(errorMsg);
        }
    } catch (error) {
        console.error("AI Error:", error);
        if (error.message.includes("leaked") || error.message.includes("key")) {
            aiError = "API 키가 만료되었거나 차단되었습니다. 관리자에게 문의하여 새로운 Google API 키를 설정해주세요.";
        } else {
            aiError = "분석 결과를 가져오는 중 오류가 발생했습니다. 잠시 후 다시 시도해주세요.";
        }
    } finally {
        isLoadingAi = false;
        render();
    }
}

render();
</script>
